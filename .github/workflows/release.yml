name: Release

# Two triggers, two responsibilities:
#
#   workflow_dispatch — manually trigger to open the Release PR when
#     ready to cut a release. This is the explicit decision to release.
#
#   push: branches: main — detects when the Release PR has been merged
#     and creates the vX.Y.Z tag. Does NOT open new PRs on regular merges.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
